# Pre-merge CI: fast checks on every push/PR.
#
# Only does the things that fail quickly:
#   - cargo fmt / clippy / test on the Rust core
#   - frontend type-check + build
#   - one platform smoke-build (linux x64) to catch packaging breakage
#
# Full multi-platform builds live in release.yml and only run on tag push.

name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - "inbox/**"
      - "*.md"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "inbox/**"
      - "*.md"
      - "LICENSE"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: rust
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: install linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libssl-dev librsvg2-dev \
            libayatana-appindicator3-dev
      - name: rewrite [patch] for CI
        shell: bash
        run: |
          python3 - <<'PY'
          path = "src-tauri/Cargo.toml"
          with open(path) as f:
              s = f.read()
          subs = [
              ('presage = { path = "../../presage/presage" }',
               'presage = { git = "https://github.com/calibrae/presage", branch = "storage-service" }'),
              ('presage-store-sqlite = { path = "../../presage/presage-store-sqlite" }',
               'presage-store-sqlite = { git = "https://github.com/calibrae/presage", branch = "storage-service" }'),
              ('libsignal-service = { path = "../../libsignal-service-rs" }',
               'libsignal-service = { git = "https://github.com/calibrae/libsignal-service-rs", branch = "storage-service" }'),
          ]
          changed = 0
          for old, new in subs:
              if old in s:
                  s = s.replace(old, new, 1)
                  changed += 1
                  print(f"rewrote: {old.split(' =')[0]}")
          if changed == 0:
              print("no patch rewrites needed (already CI-pinned?)")
          with open(path, "w") as f:
              f.write(s)
          PY
      - name: fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check
        continue-on-error: true  # not enforced yet — flip to false once formatted
      - name: clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true  # presage emits dead-code warnings; tighten later
      - name: test
        working-directory: src-tauri
        run: cargo test --lib

  frontend:
    name: frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: check
        run: npx svelte-check --tsconfig ./tsconfig.json
      - name: build
        run: npm run build
      - name: test
        run: npm test -- --run
        continue-on-error: true
